services:
    prometheus:
        image: prom/prometheus:latest
        container_name: prometheus
        profiles: [ metrics ]
        volumes:
            - ./config/prometheus:/etc/prometheus
            - ${DATA_PROMETHEUS}:/prometheus
        command:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--storage.tsdb.retention.time=7d'
            - '--web.console.libraries=/etc/prometheus/console_libraries'
            - '--web.console.templates=/etc/prometheus/consoles'
            - '--web.enable-lifecycle'
        ports:
            - "127.0.0.1:9090:9090"
        networks:
            - net
        restart: unless-stopped
        logging:
            driver: "syslog"
            options:
                syslog-address: "udp://127.0.0.1:514"
                syslog-facility: "daemon"
                tag: "prometheus"

    node-exporter:
        image: prom/node-exporter:latest
        container_name: node-exporter
        profiles: [ metrics ]
        volumes:
            - /proc:/host/proc:ro
            - /sys:/host/sys:ro
            - /:/rootfs:ro
        command:
            - '--path.procfs=/host/proc'
            - '--path.rootfs=/rootfs'
            - '--path.sysfs=/host/sys'
            - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
        expose:
            - 9100
        networks:
            - net
        restart: unless-stopped
        logging:
            driver: "syslog"
            options:
                syslog-address: "udp://127.0.0.1:514"
                syslog-facility: "daemon"
                tag: "node-exporter"

    nginx-exporter:
        image: nginx/nginx-prometheus-exporter
        container_name: nginx-exporter
        profiles: [ metrics ]
        command:
            - '--nginx.scrape-uri=http://proxy:8099/stub_status'
        expose:
            - 9113
        networks:
            - net
        restart: unless-stopped
        logging:
            driver: "syslog"
            options:
                syslog-address: "udp://127.0.0.1:514"
                syslog-facility: "daemon"
                tag: "nginx-exporter"

    mysql-exporter:
        image: prom/mysqld-exporter:latest
        container_name: mysqld-exporter
        profiles: [ metrics ]
        volumes:
            - ${CONF_MYSQL_EXPORTER}:/config/.my.cnf
        command:
            - '--config.my-cnf=/config/.my.cnf'
            - '--mysqld.address=db:3306'
            - '--exporter.log_slow_filter'
        environment:
            MYSQLD_EXPORTER_PASSWORD: ${MYSQL_EXPORTER_PASSWORD}
        expose:
            - 9104
        networks:
            - net
        restart: unless-stopped
        logging:
            driver: "syslog"
            options:
                syslog-address: "udp://127.0.0.1:514"
                syslog-facility: "daemon"
                tag: "mysqld-exporter"

    redis-exporter:
        image: oliver006/redis_exporter
        container_name: redis-exporter
        profiles: [ metrics ]
        command:
            - '--redis.addr=redis://redis:6379'
        expose:
            - 9121
        networks:
            - net
        restart: unless-stopped
        logging:
            driver: "syslog"
            options:
                syslog-address: "udp://127.0.0.1:514"
                syslog-facility: "daemon"
                tag: "redis-exporter"

    cadvisor:
        image: gcr.io/cadvisor/cadvisor:v0.52.0
        container_name: cadvisor
        profiles: [ metrics ]
        volumes:
            - /:/rootfs:ro
            - /var/run:/var/run:ro
            - /sys:/sys:ro
            - /var/lib/docker/:/var/lib/docker:ro
            - /dev/disk/:/dev/disk:ro
            #- /var/run/docker.sock:/var/run/docker.sock:ro  # Only needed on Docker Desktop for Mac
        command:
            - '--housekeeping_interval=15s'
            - '--docker_only=true'
            - '--disable_metrics=disk,network,tcp,udp,percpu,sched,process'
        expose:
            - 8080
        networks:
            - net
        restart: unless-stopped
        logging:
            driver: "syslog"
            options:
                syslog-address: "udp://127.0.0.1:514"
                syslog-facility: "daemon"
                tag: "cadvisor"

    grafana:
        image: grafana/grafana
        container_name: grafana
        profiles: [ metrics ]
        user: "472"  # Grafana's built-in user
        environment:
            - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
            - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
            - GF_USERS_ALLOW_SIGN_UP=false
            - GF_AUTH_ANONYMOUS_ENABLED=false
        volumes:
            - ${DATA_GRAFANA}:/var/lib/grafana
            - ${CONF_GRAFANA}:/etc/grafana/grafana.ini
        networks:
            - net
        restart: unless-stopped
        logging:
            driver: "syslog"
            options:
                syslog-address: "udp://127.0.0.1:514"
                syslog-facility: "daemon"
                tag: "grafana"
